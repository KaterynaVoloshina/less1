<!DOCTYPE html>
<html>
  
  <head>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="css/reset.css">
  <link rel="stylesheet" type="text/css" href="css/styles-all-pages.css">
  <link rel="stylesheet" type="text/css" href="css/header.css">
  <link rel="stylesheet" type="text/css" href="css/catalog.css">
  <link rel="stylesheet" type="text/css" href="css/footer.css">
  <title>Каталог</title>
  </head>
  <body>
    <header>
      <a href="/" class="logo"><img src="icon/nerds-logo.svg" alt="логотип"></a>
      <nav>
        <ul class="menu">
          <li><a href="#">Студия</a></li>
          <li><a href="#">Клиенты</a></li>
          <li><a href="#">Магазин</a></li>
          <li><a href="#">Контакты</a></li>
        </ul>
      </nav>
      <a href="#">
        <img src="icon/cart-icon.svg" alt="" class="cart-icon">
        <span>Корзина</span>
      </a>
    </header>

    <section class="first-scrin"><h1>Магазин готовых шаблонов</h1></section>
    
    <main class="content">
        
      <aside>
            <h4>Стоимость:</h4>

            <div class="price">
                <div class="price_point">
                  <div class="longline"><div class="shortline"><div class="circl"></div><div class="circl"></div></div></div>
                </div>
                <div class="price_input">
                    <div>
                      <span class="text-for-characteristic">от</span>
                      <input class="cell-price" type="number" placeholder="0">   
                    </div>
                    <div>
                      <span class="text-for-characteristic">до</span>
                      <input class="cell-price" type="number" placeholder="15 000">   
                    </div>
                </div>
            </div>
            
            <h4>Сетка:</h4>

            <div class="layout">
              <label>
                <input class="layout_choice" type="radio" name="adaptive" checked>
                <span class="text-aside">Адаптивная</span>
              </label>
              <label>
                <input class="layout_choice" type="radio" name="fixed">
                <span class="text-aside">Фиксированная</span>
              </label>
              <label>
                <input class="layout_choice" type="radio" name="rubber">
                <span class="text-aside">Резиновая</span>
              </label>
            </div>

             <h4>Особенности:</h4>

            <div class="layout">
              <label>
                <input class="layout_choice"  type="checkbox" name="slider" checked>
                <span class="text-aside">Слайдер</span>
              </label>
              <label>
                <input class="layout_choice"  type="checkbox" name="Benefits block">
                <span class="text-aside">Блок преимуществ</span>
              </label>
              <label>
                <input class="layout_choice"  type="checkbox" name="News">
                <span class="text-aside">Новости</span>
              </label>
              <label>
                <input class="layout_choice"  type="checkbox" name="Gallery">
                <span class="text-aside">Галерея</span>
              </label>
              <label>
                <input class="layout_choice"  type="checkbox" name="Basket">
                <span class="text-aside">Корзина</span>
              </label>
            </div>

            <button class="button-all button-grey">Показать</button>


      </aside>
        
      <section class="shablon">ee</section>
   
    </main>


  </body>
</html>
